<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SpamSentinel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0d14;
      --surface:   #111623;
      --surface2:  #181f2e;
      --border:    #1e2a3e;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --green:     #22c55e;
      --red:       #ef4444;
      --orange:    #f97316;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-brand span { color: var(--text); }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-left: 1.5rem;
      transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* ── Alerts banner ── */
    .alert-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .alert-banner.success { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }

    /* ── Flash messages ── */
    .flashes { padding: 1rem 2rem 0; }
    .flash {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    .flash.error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
    .flash.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card .num {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger  { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-ghost   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--mono);
    }
    .badge-spam    { background: rgba(239,68,68,0.15);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
    .badge-ham     { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .badge-danger  { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-warn    { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-safe    { background: rgba(34,197,94,0.15);  color: var(--green); }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.6rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(30,42,62,0.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Progress bar ── */
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.25rem;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ── Form inputs ── */
    input[type=text], input[type=email], textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .form-group { margin-bottom: 1rem; }

    /* ── Misc ── */
    .text-muted { color: var(--muted); }
    .text-mono  { font-family: var(--mono); font-size: 0.85rem; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .flex { display: flex; align-items: center; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .justify-between { justify-content: space-between; }

    /* ── Model warning ── */
    .model-warning {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .model-warning h3 { color: var(--yellow); margin-bottom: 0.5rem; }
    .model-warning code {
      background: var(--surface2);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.85rem;
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-brand">SPAM<span>SENTINEL</span></a>
  <div class="nav-links">
    <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Analyze</a>
    <a href="/dashboard" {% if request.endpoint=='dashboard' %}class="active"{% endif %}>Dashboard</a>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flashes">
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
